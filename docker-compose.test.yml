services:
  mysql-test:
    image: mysql:8.0
    container_name: event-booking-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: event_booking_test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    ports:
      - "3307:3306"   # 3307 on the host so it never collides with a local MySQL already on 3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/mysql   # ephemeral storage — fine for a test DB, and faster
